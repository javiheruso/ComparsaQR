version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: comparsa-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: comparsa
      POSTGRES_PASSWORD: comparsa_local
      POSTGRES_DB: comparsa
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
